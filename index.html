<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magnitud — Web Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy:#0D1128; --card:#1A1F3C; --dark:#252B52; --blue:#4F6EF7;
    --bluel:#7A97FF; --green:#7EEFB2; --white:#F0F2FF; --muted:#8A91B8;
    --border:rgba(79,110,247,0.18);
  }
  html,body { height:100%; font-family:'DM Sans',sans-serif; background:var(--navy); color:var(--white);
    display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; overflow-x:hidden; }
  body::before { content:''; position:fixed; inset:0;
    background-image:linear-gradient(rgba(79,110,247,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(79,110,247,0.04) 1px,transparent 1px);
    background-size:48px 48px; pointer-events:none; }
  .page { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2.5rem;
    padding:2rem; width:100%; max-width:560px; text-align:center; position:relative; }
  .logo-wrap { display:flex; align-items:center; gap:1.2rem; background:var(--card); border:1px solid var(--border);
    border-radius:20px; padding:1.4rem 2rem; width:100%; }
  .logo-icon { width:72px; height:72px; background:var(--dark); border-radius:16px; border:1px solid rgba(79,110,247,0.35);
    position:relative; flex-shrink:0; overflow:hidden; }
  .logo-icon-header { position:absolute; top:0;left:0;right:0; height:18px; background:var(--blue); border-radius:14px 14px 0 0; }
  .logo-icon-grid { position:absolute; top:18px;left:0;right:0;bottom:0; }
  .logo-icon-grid::before { content:''; position:absolute; top:12px;left:0;right:0; height:1px;
    background:rgba(79,110,247,0.2); box-shadow:0 14px 0 rgba(79,110,247,0.2),0 28px 0 rgba(79,110,247,0.2); }
  .logo-icon-grid::after { content:''; position:absolute; top:0;left:22px;bottom:0; width:1px;
    background:rgba(79,110,247,0.2); box-shadow:22px 0 0 rgba(79,110,247,0.2); }
  .logo-icon-dot { position:absolute; top:-7px;right:-7px; width:16px;height:16px; border-radius:50%;
    background:var(--green); border:2px solid var(--card); }
  .logo-texts { text-align:left; }
  .logo-name { font-family:'Syne',sans-serif; font-size:1.8rem; font-weight:800; letter-spacing:1px; line-height:1; color:var(--white); }
  .logo-sub { font-size:0.68rem; letter-spacing:4px; color:var(--green); margin-top:5px; font-weight:400; }
  .logo-wave { position:absolute; bottom:10px;left:4px;right:4px; height:20px; }
  .tagline { font-family:'Syne',sans-serif; font-size:clamp(1.5rem,5vw,2.2rem); font-weight:700; line-height:1.2; letter-spacing:-0.5px; }
  .tagline em { font-style:normal; color:var(--bluel); }
  .desc { font-size:1rem; color:var(--muted); line-height:1.7; font-weight:300; max-width:420px; }

  .cta-group { display:flex; flex-direction:column; gap:12px; width:100%; }
  .cta { display:inline-flex; align-items:center; gap:10px; background:var(--blue); color:#fff;
    text-decoration:none; font-family:'DM Sans',sans-serif; font-size:1.05rem; font-weight:500;
    padding:1rem 2.2rem; border-radius:12px; transition:background 0.2s,transform 0.15s; width:100%; justify-content:center; }
  .cta:hover { background:var(--bluel); transform:translateY(-2px); }
  .cta-secondary { background:transparent; border:1px solid var(--border); color:var(--muted); font-size:0.9rem; padding:0.8rem 2rem; }
  .cta-secondary:hover { background:var(--card); color:var(--white); transform:translateY(-1px); }

  .free-badge { display:inline-flex; align-items:center; gap:6px; background:rgba(126,239,178,0.08);
    border:1px solid rgba(126,239,178,0.22); color:var(--green); font-size:0.75rem; font-weight:500;
    letter-spacing:1.5px; padding:5px 14px; border-radius:100px; text-transform:uppercase; }
  .dot { width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 2s ease-in-out infinite; }
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
  .footer { font-size:0.75rem; color:var(--muted); font-weight:300; }
</style>
</head>
<body>
<div class="page">
  <div class="free-badge"><span class="dot"></span>100 % gratuit — aucun compte requis</div>

  <div class="logo-wrap">
    <div class="logo-icon">
      <div class="logo-icon-header"></div>
      <div class="logo-icon-grid"></div>
      <svg class="logo-wave" viewBox="0 0 64 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M2 10 Q9 1 16 10 Q23 19 30 10 Q37 1 44 10 Q51 19 58 10 Q60 8 62 9" stroke="#7EEFB2" stroke-width="2" stroke-linecap="round" fill="none"/>
      </svg>
      <div class="logo-icon-dot"></div>
    </div>
    <div class="logo-texts">
      <div class="logo-name">MAGNITUD</div>
      <div class="logo-sub">WEB  PLANNER</div>
    </div>
  </div>

  <div>
    <p class="tagline">Planifiez vos projets web<br>avec <em>clarté & précision</em></p>
  </div>

  <p class="desc">Un outil simple et puissant pour structurer, suivre et livrer vos projets digitaux — accessible à tous, gratuitement.</p>

  <div class="cta-group">
    <a class="cta" href="./checklist.html">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 1l2 6h6l-5 3.5 2 6L9 13l-5 3.5 2-6L1 7h6L9 1z" fill="currentColor"/></svg>
      Accéder au programme — Villa 2
    </a>
  </div>

  <p class="footer">© 2025 Magnitud · Propulsé par Netlify</p>
</div>
</body>
</html>
