<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magnitud — Web Planner</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy:  #0D1128;
    --card:  #1A1F3C;
    --dark:  #252B52;
    --blue:  #4F6EF7;
    --bluel: #7A97FF;
    --green: #7EEFB2;
    --white: #F0F2FF;
    --muted: #8A91B8;
    --border: rgba(79,110,247,0.18);
  }

  html, body {
    height: 100%;
    font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    background: var(--navy);
    color: var(--white);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(79,110,247,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(79,110,247,0.04) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
  }

  .page {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2rem;
    padding: 2rem;
    width: 100%;
    max-width: 520px;
    text-align: center;
    position: relative;
  }

  .free-badge {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: rgba(126,239,178,0.08);
    border: 1px solid rgba(126,239,178,0.22);
    color: var(--green);
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 1.5px;
    padding: 5px 14px;
    border-radius: 100px;
    text-transform: uppercase;
  }

  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

  .logo-wrap {
    display: flex;
    align-items: center;
    gap: 1.2rem;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 1.4rem 1.8rem;
    width: 100%;
  }

  .logo-icon {
    width: 70px; height: 70px;
    background: var(--dark);
    border-radius: 14px;
    border: 1px solid rgba(79,110,247,0.35);
    position: relative;
    flex-shrink: 0;
    overflow: hidden;
  }

  .logo-icon-header {
    position: absolute;
    top: 0; left: 0; right: 0; height: 18px;
    background: var(--blue);
    border-radius: 12px 12px 0 0;
  }

  .logo-icon-grid {
    position: absolute;
    top: 18px; left: 0; right: 0; bottom: 0;
  }
  .logo-icon-grid::before {
    content: '';
    position: absolute;
    top: 11px; left: 0; right: 0; height: 1px;
    background: rgba(79,110,247,0.2);
    box-shadow: 0 13px 0 rgba(79,110,247,0.2), 0 26px 0 rgba(79,110,247,0.2);
  }
  .logo-icon-grid::after {
    content: '';
    position: absolute;
    top: 0; left: 22px; bottom: 0; width: 1px;
    background: rgba(79,110,247,0.2);
    box-shadow: 22px 0 0 rgba(79,110,247,0.2);
  }

  .logo-wave {
    position: absolute;
    bottom: 8px; left: 4px; right: 4px; height: 18px;
  }

  .logo-dot {
    position: absolute;
    top: -6px; right: -6px;
    width: 15px; height: 15px;
    border-radius: 50%;
    background: var(--green);
    border: 2px solid var(--card);
  }

  .logo-texts { text-align: left; }

  .logo-name {
    font-size: 1.9rem;
    font-weight: 800;
    letter-spacing: 2px;
    line-height: 1;
    color: var(--white);
  }

  .logo-sub {
    font-size: 0.65rem;
    letter-spacing: 4px;
    color: var(--green);
    margin-top: 6px;
    font-weight: 400;
    text-transform: uppercase;
  }

  .tagline {
    font-size: clamp(1.4rem, 5vw, 2rem);
    font-weight: 700;
    line-height: 1.25;
  }

  .tagline em {
    font-style: normal;
    color: var(--bluel);
  }

  .desc {
    font-size: 0.97rem;
    color: var(--muted);
    line-height: 1.75;
    font-weight: 300;
    max-width: 400px;
  }

  .cta {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: var(--blue);
    color: #fff;
    text-decoration: none;
    font-size: 1rem;
    font-weight: 500;
    padding: 1rem 2rem;
    border-radius: 12px;
    width: 100%;
    transition: background 0.2s, transform 0.15s;
  }
  .cta:hover { background: var(--bluel); transform: translateY(-2px); }

  .footer {
    font-size: 0.73rem;
    color: var(--muted);
    font-weight: 300;
  }
</style>
</head>
<body>

<div class="page">

  <div class="free-badge">
    <span class="dot"></span>
    100 % gratuit — accès immédiat
  </div>

  <div class="logo-wrap">
    <div class="logo-icon">
      <div class="logo-icon-header"></div>
      <div class="logo-icon-grid"></div>
      <svg class="logo-wave" viewBox="0 0 62 18" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M2 9 Q8 1 15 9 Q22 17 29 9 Q36 1 43 9 Q50 17 57 9 Q59 7 61 8" stroke="#7EEFB2" stroke-width="2" stroke-linecap="round" fill="none"/>
      </svg>
      <div class="logo-dot"></div>
    </div>
    <div class="logo-texts">
      <div class="logo-name">MAGNITUD</div>
      <div class="logo-sub">Web &nbsp;Planner</div>
    </div>
  </div>

  <p class="tagline">Planifiez vos projets web<br>avec <em>clarté & précision</em></p>

  <p class="desc">Un outil simple et puissant pour structurer, suivre et livrer vos projets digitaux — gratuitement, sans inscription.</p>

  <!-- ⚠️ Remplace l'URL par ton vrai lien Netlify -->
  <a class="cta" href="https://TON-APP.netlify.app" target="_blank" rel="noopener">
    <svg width="17" height="17" viewBox="0 0 17 17" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M8.5 1.5l1.8 5.2H16l-4.5 3.3 1.7 5.2-4.2-3-4.2 3 1.7-5.2L2 6.7h5.7L8.5 1.5z" fill="currentColor"/>
    </svg>
    Lancer le programme gratuitement
  </a>

  <p class="footer">© 2025 Magnitud · Hébergé sur Netlify</p>

</div>

</body>
</html>
